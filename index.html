<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林默白 · 品牌设计师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f9f9f9;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .sub {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
        }
        .divider {
            width: 60px;
            height: 4px;
            background: #000;
            margin: 1.5rem auto;
        }
        p {
            color: #555;
            line-height: 1.8;
            font-size: 1.05rem;
        }
        .tag {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #333;
            margin: 0 4px 8px 4px;
        }
        .footer {
            margin-top: 2.5rem;
            font-size: 0.9rem;
            color: #aaa;
        }
        a {
            color: #000;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
        }
        a:hover { border-bottom-color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>林默白</h1>
        <div class="sub">品牌设计师 · 视觉策略</div>
        <div class="divider"></div>
        <p>
            专注品牌识别与视觉体验设计。<br>
            服务范围：品牌策略 · VI系统 · 包装设计 · 数字界面
        </p>
        <div style="margin: 2rem 0;">
            <span class="tag">品牌全案</span>
            <span class="tag">视觉识别</span>
            <span class="tag">设计咨询</span>
        </div>
        <p style="font-size: 0.95rem; color: #888;">
            📧 lmb@design.studio &nbsp;·&nbsp; 📱 +86 138 0000 0000
        </p>
        <div class="footer">
            © 2026 林默白 · 保留所有权利
        </div>
    </div>
</body>
</html>
